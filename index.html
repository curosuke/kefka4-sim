function getLocalEffect(effect) {
    if (effect === "진실") return t("truth");
    if (effect === "거짓") return t("fake");
    if (effect === "화염") return t("flame");
    if (effect === "해일") return t("flood");
    if (effect === "두근두근 알테마") return t("ultima");
    return effect;
}

const mapCenter = { x: 400, y: 400 };

function checkFinalMemorySafety() {
    if (player.isDead) return;

    let pastThundergaVal = pastThundergaTruth === '진실' ? 1 : -1;
    let futureThundergaVal = finalMemoryState.topTruth === '진실' ? 1 : -1;
    let finalThundergaIsTruth = (pastThundergaVal * futureThundergaVal) === 1;

    let pastBlizzagaVal = pastBlizzagaTruth === '진실' ? 1 : -1;
    let futureBlizzagaVal = finalMemoryState.bottomTruth === '진실' ? 1 : -1;
    let finalBlizzagaIsTruth = (pastBlizzagaVal * futureBlizzagaVal) === 1;

    const px = player.x - mapCenter.x; const py = player.y - mapCenter.y;
    
    let inBlizzardAoE = false;
    if (finalMemoryState.blizzardPattern === 0) {
        if ((px >= 0 && py <= 0) || (px <= 0 && py >= 0)) inBlizzardAoE = true;
    } else {
        if ((px <= 0 && py <= 0) || (px >= 0 && py >= 0)) inBlizzardAoE = true;
    }

    let inThunderAoE = false;
    const rotX = (px - py) / Math.sqrt(2); const rotY = (px + py) / Math.sqrt(2); const w = 150; 
    switch(finalMemoryState.thunderPattern) {
        case 0: if ((rotX >= -w && rotX < 0) || (rotX >= w && rotX <= 2*w)) inThunderAoE = true; break;
        case 1: if ((rotX >= -2*w && rotX < -w) || (rotX >= 0 && rotX < w)) inThunderAoE = true; break;
        case 2: if ((rotY >= -w && rotY < 0) || (rotY >= w && rotY <= 2*w)) inThunderAoE = true; break;
        case 3: if ((rotY >= -2*w && rotY < -w) || (rotY >= 0 && rotY < w)) inThunderAoE = true; break;
    }

    let failedBlizzard = finalBlizzagaIsTruth ? inBlizzardAoE : !inBlizzardAoE;
    let failedThunder = finalThundergaIsTruth ? inThunderAoE : !inThunderAoE;

    if (failedBlizzard || failedThunder) {
        triggerPlayerDeath(t('death_final_memory'));
    } else {
        explosionVisuals.push({ x: player.x, y: player.y, radius: 10, maxRadius: 80, color: '#4ec9b0', alpha: 1 });
    }
}

const originalDateNow = Date.now;
let isPaused = false;
let pauseStartTime = null;
let totalPausedTime = 0;

Date.now = function() {
    if (isPaused) return pauseStartTime - totalPausedTime;
    return originalDateNow.call(Date) - totalPausedTime;
};

window.addEventListener('keydown', e => {
    if (e.key.toLowerCase() === 'p') {
        if (!isGameStarted || isGameOver || isGameCleared) return;
        isPaused = !isPaused;
        if (isPaused) {
            pauseStartTime = originalDateNow.call(Date);
        } else {
            totalPausedTime += (originalDateNow.call(Date) - pauseStartTime);
        }
    }
});

function executeSingleEyeCheck(eyeObj) {
    if (eyeObj.processed || player.isDead) return;
    eyeObj.processed = true;
    let isTruth = (eyeObj.rule === "진실");
    let facingA = isFacingBossA(); 
    if (isTruth) {
        if (facingA) triggerPlayerDeath(t('eye_fail_truth').replace('Wave', 'Wave ' + eyeObj.wave));
        else explosionVisuals.push({ x: mapCenter.x, y: mapCenter.y, radius: 10, maxRadius: 150, color: '#bf55ec', alpha: 1 });
    } else {
        if (!facingA) triggerPlayerDeath(t('eye_fail_fake').replace('Wave', 'Wave ' + eyeObj.wave));
        else explosionVisuals.push({ x: mapCenter.x, y: mapCenter.y, radius: 10, maxRadius: 150, color: '#a2d2ff', alpha: 1 });
    }
    activeDebuffs.forEach(d => { if (d.type === "EYE" && d.initialDuration === eyeObj.initialDuration) d.processed = true; });

    if (eyeObj.wave === 1 && !player.isDead) {
        bosses[0].isCasting = true;
        bosses[0].castName = "두근두근 알테마";
        bosses[0].startTime = Date.now();
        bosses[0].duration = 5000;
        bosses[0].progress = 0;
        bosses[0].castCompleteTime = null;
    }
}

function executeEnvironmentCheck(targetAbsoluteTime) {
    if (player.isDead) return;

    let waterDebuff = activeDebuffs.find(d => d.type === "WATER" && d.timeLeft <= 2 && !d.processed);
    let thunderDebuff = activeDebuffs.find(d => d.type === "THUNDER" && d.timeLeft <= 2 && !d.processed);
    let bombDebuff = activeDebuffs.find(d => d.type === "BOMB" && d.timeLeft <= 2 && !d.processed);

    let hasWater = !!waterDebuff;
    let hasThunder = !!thunderDebuff;
    let hasBomb = !!bombDebuff;
    let isNoEnvBuff = (!hasWater && !hasThunder);

    if (hasBomb) {
        let isBombTruth = (bombDebuff.rule === "진실");
        let isMoving = keys['w'] || keys['s'] || keys['a'] || keys['d'] || keys['arrowup'] || keys['arrowdown'] || keys['arrowleft'] || keys['arrowright'];
        if (isBombTruth ? isMoving : !isMoving) triggerPlayerDeath(t('death_bomb_move'));
    }

    let dist12 = Math.hypot(invisibleObjects.h12.x - player.x, invisibleObjects.h12.y - player.y) < 120;
    let dist3  = Math.hypot(invisibleObjects.h3.x - player.x, invisibleObjects.h3.y - player.y) < 120;
    let dist6  = Math.hypot(invisibleObjects.h6.x - player.x, invisibleObjects.h6.y - player.y) < 120;
    let dist9  = Math.hypot(invisibleObjects.h9.x - player.x, invisibleObjects.h9.y - player.y) < 120;

    if (isNoEnvBuff) {
        if (!dist12 && !dist6) {
            triggerPlayerDeath(t('death_thunder_stack'));
            return;
        } else if (dist3 || dist9) {
            triggerPlayerDeath(t('death_thunder_stack'));
            return;
        } else {
            explosionVisuals.push({ x: player.x, y: player.y, radius: 10, maxRadius: 80, color: '#4ec9b0', alpha: 1 });
        }
    } else {
        let activeDebuff = waterDebuff || thunderDebuff;
        let isEnvTruth = (activeDebuff.rule === "진실");
        let finalGimmickResult = ""; 
        if (hasWater) {
            finalGimmickResult = isEnvTruth ? "SHARE" : "SPREAD"; 
        } else if (hasThunder) {
            finalGimmickResult = isEnvTruth ? "SPREAD" : "SHARE"; 
        }

        if (finalGimmickResult === "SPREAD") {
            if (!dist3 && !dist9) {
                triggerPlayerDeath(t('death_water_spread'));
            } else {
                explosionVisuals.push({ x: player.x, y: player.y, radius: 10, maxRadius: 80, color: '#ff9f1c', alpha: 1 });
            }
        } else if (finalGimmickResult === "SHARE") {
            if (!dist12 && !dist6) {
                triggerPlayerDeath(t('death_water_stack'));
            } else if (dist3 || dist9) {
                triggerPlayerDeath(t('death_water_stack'));
            } else {
                explosionVisuals.push({ x: player.x, y: player.y, radius: 10, maxRadius: 80, color: '#00b4d8', alpha: 1 });
            }
        }
    }

    activeDebuffs.forEach(d => { if ((d.type === "WATER" || d.type === "THUNDER" || d.type === "BOMB") && d.timeLeft <= 2) d.processed = true; });
}

function checkThundergaSafety() {
    if (thunderga_Gimmick.judged || player.isDead) return;
    thunderga_Gimmick.judged = true;
    
    const px = player.x - mapCenter.x; const py = player.y - mapCenter.y;
    let inThundergaAoE = false;
    const rotX = (px - py) / Math.sqrt(2); const rotY = (px + py) / Math.sqrt(2); const w = 150; 
    
    switch(thunderga_Gimmick.thunderPattern) {
        case 0: if ((rotX >= -w && rotX < 0) || (rotX >= w && rotX <= 2*w)) inThundergaAoE = true; break;
        case 1: if ((rotX >= -2*w && rotX < -w) || (rotX >= 0 && rotX < w)) inThundergaAoE = true; break;
        case 2: if ((rotY >= -w && rotY < 0) || (rotY >= w && rotY <= 2*w)) inThundergaAoE = true; break;
        case 3: if ((rotY >= -2*w && rotY < -w) || (rotY >= 0 && rotY < w)) inThundergaAoE = true; break;
    }

    let isTruth = (thunderga_Gimmick.effect === "진실");
    if (isTruth ? inThundergaAoE : !inThundergaAoE) {
        triggerPlayerDeath(t('death_center_thunderga'));
    } else {
        explosionVisuals.push({ x: player.x, y: player.y, radius: 10, maxRadius: 100, color: '#ffd700', alpha: 1 });
    }
}

function evaluateSubBossAoESafety(aoe) {
    if (player.isDead) return;
    let dist = Math.hypot(player.x - aoe.x, player.y - aoe.y);

    if (aoe.shape === "CIRCLE") {
        if (dist <= 80) triggerPlayerDeath(t('death_11_flame'));
    } else if (aoe.shape === "DONUT") {
        if (dist >= 80 && dist <= 220) triggerPlayerDeath(t('death_11_flood'));
    }
    if (!player.isDead) {
        explosionVisuals.push({ x: aoe.x, y: aoe.y, radius: 10, maxRadius: aoe.shape === 'CIRCLE' ? 80 : 220, color: '#a2d2ff', alpha: 1 });

function checkWave3SplitSafety() {
    let colorDebuff = activeDebuffs.find(d => d.type === "DEAD_SCAR" || d.type === "LIVE_SCAR");
    let hitDebuff = activeDebuffs.find(d => d.type === "ALAG" || d.type === "TRANSCEND");
    if (!colorDebuff || !hitDebuff || player.isDead) return;

    colorDebuff.processed = true; hitDebuff.processed = true;
    wave3BossB.showAoE = false;

    const vX = player.x - wave3BossB.x; const vY = player.y - wave3BossB.y;
    const bCenterX = mapCenter.x - wave3BossB.x; const bCenterY = mapCenter.y - wave3BossB.y;
    
    const crossProduct = bCenterX * vY - bCenterY * vX;
    const distBossToCenter = Math.sqrt(bCenterX * bCenterX + bCenterY * bCenterY);
    const distToLine = Math.abs(crossProduct) / distBossToCenter;

    if (distToLine <= 75) {
        triggerPlayerDeath(t('death_red_line'));
        return;
    }
    let standOnColor;
    if (wave3BossB.isPinkRight) {
        standOnColor = (crossProduct >= 0) ? "PINK" : "BLUE";
    } else {
        standOnColor = (crossProduct >= 0) ? "BLUE" : "PINK";
    }

    let isBlueScar = colorDebuff.type === "DEAD_SCAR";
    let isAlagField = hitDebuff.type === "ALAG";
    
    let isBossTruth = (wave3BossB.currentEffect === "진실");
    if (!isBossTruth) isAlagField = !isAlagField; 

    if (isAlagField) {
        if (isBlueScar && standOnColor !== "PINK") triggerPlayerDeath(t('death_live_pink'));
        if (!isBlueScar && standOnColor !== "BLUE") triggerPlayerDeath(t('death_live_blue'));
    } else {
        if (isBlueScar && standOnColor !== "BLUE") triggerPlayerDeath(t('death_dead_blue'));
        if (!isBlueScar && standOnColor !== "PINK") triggerPlayerDeath(t('death_dead_pink'));
    }

    if (!player.isDead) {
        explosionVisuals.push({ x: player.x, y: player.y, radius: 10, maxRadius: 100, color: standOnColor === "BLUE" ? '#00b4d8' : '#ff69b4', alpha: 1 });
    }
}

function processDebuffTrigger(debuff) {
    if (debuff.processed || player.isDead) return;
    if (debuff.type === "DEAD_SCAR" || debuff.type === "LIVE_SCAR" || debuff.type === "ALAG" || debuff.type === "TRANSCEND") return;

    if (debuff.type === "FLAME" || debuff.type === "FLOOD") { 
        debuff.processed = true; 
        let targetShape = (debuff.type === "FLAME") ? (debuff.rule === "진실" ? "CIRCLE" : "DONUT") : (debuff.rule === "진실" ? "DONUT" : "CIRCLE");
        subBossPlacedAoEs.push({
            x: player.x, y: player.y, shape: targetShape, placeTime: Date.now(),
            detonationTime: Date.now() + 3000, showVisual: false, judged: false
        });
        return; 
    }

    let isTruth = (debuff.rule === "진실");

    switch(debuff.type) {
        case "WATER":
        case "THUNDER":
        case "BOMB":
            break;
        case "EYE":
            debuff.processed = true;
            let targetEye = backgroundEyes.find(e => e.initialDuration === debuff.initialDuration && !e.processed);
            if (targetEye) executeSingleEyeCheck(targetEye);
            break;
    }
}

canvas.addEventListener('click', function(e) {
    const rect = canvas.getBoundingClientRect();
    const mouseX = (e.clientX - rect.left) * (canvas.width / rect.width);
    const mouseY = (e.clientY - rect.top) * (canvas.height / rect.height);

    if (!isGameStarted) {
        if (mouseX >= langBtnKR.x && mouseX <= langBtnKR.x + langBtnKR.width && mouseY >= langBtnKR.y && mouseY <= langBtnKR.y + langBtnKR.height) { currentLanguage = 'ko'; }
        if (mouseX >= langBtnEN.x && mouseX <= langBtnEN.x + langBtnEN.width && mouseY >= langBtnEN.y && mouseY <= langBtnEN.y + langBtnEN.height) { currentLanguage = 'en'; }
        if (mouseX >= langBtnJP.x && mouseX <= langBtnJP.x + langBtnJP.width && mouseY >= langBtnJP.y && mouseY <= langBtnJP.y + langBtnJP.height) { currentLanguage = 'ja'; }

        if (mouseX >= startButton.x && mouseX <= startButton.x + startButton.width &&
            mouseY >= startButton.y && mouseY <= startButton.y + startButton.height) {
            resetGame();
        }
        return;
    }
    if (isGameStarted && !isGameOver && !isGameCleared) {
        if (mouseX >= toggleButton.x && mouseX <= toggleButton.x + toggleButton.width &&
            mouseY >= toggleButton.y && mouseY <= toggleButton.y + toggleButton.height) {
            showDebugText = !showDebugText;
        }
        if (mouseX >= resetButton.x && mouseX <= resetButton.x + resetButton.width &&
            mouseY >= resetButton.y && mouseY <= resetButton.y + resetButton.height) {
            resetGame();
        }
    }
    if (isGameOver || isGameCleared) {
        if (mouseX >= retryButton.x && mouseX <= retryButton.x + retryButton.width &&
            mouseY >= retryButton.y && mouseY <= retryButton.y + retryButton.height) {
            resetGame();
        }
    }
});

function evaluateCurrentPosition() {
    const px = player.x - mapCenter.x; const py = player.y - mapCenter.y;
    let inBlizzardAoE = false;
    if (bossA_Gimmick.blizzardPattern === 0) {
        if ((px >= 0 && py <= 0) || (px <= 0 && py >= 0)) inBlizzardAoE = true;
    } else {
        if ((px <= 0 && py <= 0) || (px >= 0 && py >= 0)) inBlizzardAoE = true;
    }
    let inThunderAoE = false;
    const rotX = (px - py) / Math.sqrt(2); const rotY = (px + py) / Math.sqrt(2); const w = 150; 
    switch(bossA_Gimmick.thunderPattern) {
        case 0: if ((rotX >= -w && rotX < 0) || (rotX >= w && rotX <= 2*w)) inThunderAoE = true; break;
        case 1: if ((rotX >= -2*w && rotX < -w) || (rotX >= 0 && rotX < w)) inThunderAoE = true; break;
        case 2: if ((rotY >= -w && rotY < 0) || (rotY >= w && rotY <= 2*w)) inThunderAoE = true; break;
        case 3: if ((rotY >= -2*w && rotY < -w) || (rotY >= 0 && rotY < w)) inThunderAoE = true; break;
    }
    return { inBlizzardAoE, inThunderAoE };
}

function checkSafety() {
    if (bossA_Gimmick.judged) return;
    bossA_Gimmick.judged = true;
    const currentAoE = evaluateCurrentPosition();
    if ((bossA_Gimmick.bottomEffect.includes('진실') ? currentAoE.inBlizzardAoE : !currentAoE.inBlizzardAoE) ||
        (bossA_Gimmick.topEffect.includes('진실') ? currentAoE.inThunderAoE : !currentAoE.inThunderAoE)) {
        triggerPlayerDeath(t('death_center_aoe'));
    }
}

function drawAoELayers(alpha1, alpha2) {
    ctx.save();
    ctx.fillStyle = `rgba(155, 93, 229, ${alpha1})`;
    if (bossA_Gimmick.blizzardPattern === 0) {
        ctx.fillRect(mapCenter.x, 0, 400, mapCenter.y); ctx.fillRect(0, mapCenter.y, mapCenter.x, 400);
    } else {
        ctx.fillRect(0, 0, mapCenter.x, mapCenter.y); ctx.fillRect(mapCenter.x, mapCenter.y, 400, 400);
    }
    ctx.fillStyle = `rgba(255, 105, 180, ${alpha2})`; ctx.translate(mapCenter.x, mapCenter.y);
    ctx.rotate(bossA_Gimmick.thunderPattern >= 2 ? Math.PI/4 : -Math.PI/4);
    const w = 150;
    if (bossA_Gimmick.thunderPattern % 2 === 0) {
        ctx.fillRect(-w, -mapRadius, w, mapRadius*2); ctx.fillRect(w, -mapRadius, w, mapRadius*2);
    } else {
        ctx.fillRect(-2*w, -mapRadius, w, mapRadius*2); ctx.fillRect(0, -mapRadius, w, mapRadius*2);
    }
    ctx.restore();
}

}

function drawWave3SplitAoE() {
    if (!wave3BossB.showAoE) return;
    ctx.save();
    ctx.beginPath(); ctx.arc(mapCenter.x, mapCenter.y, mapRadius, 0, Math.PI * 2); ctx.clip();

    const targetAngle = Math.atan2(mapCenter.y - wave3BossB.y, mapCenter.x - wave3BossB.x);
    ctx.translate(wave3BossB.x, wave3BossB.y); ctx.rotate(targetAngle);

    if (wave3BossB.isPinkRight) {
        ctx.fillStyle = "rgba(255, 105, 180, 0.7)"; ctx.fillRect(0, 0, mapRadius * 3, mapRadius * 3);
        ctx.fillStyle = "rgba(0, 180, 216, 0.7)"; ctx.fillRect(0, -mapRadius * 3, mapRadius * 3, mapRadius * 3);
    } else {
        ctx.fillStyle = "rgba(0, 180, 216, 0.7)"; ctx.fillRect(0, 0, mapRadius * 3, mapRadius * 3);
        ctx.fillStyle = "rgba(255, 105, 180, 0.7)"; ctx.fillRect(0, -mapRadius * 3, mapRadius * 3, mapRadius * 3);
    }
    
    ctx.fillStyle = "rgba(255, 0, 0, 0.7)"; 
    ctx.fillRect(0, -75, mapRadius * 3, 150);

    ctx.restore();
}

function drawFinalMemoryAoE() {

function drawVirtualTimerIndicator() {
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (!isGameStarted && !isGameOver) {
        ctx.fillStyle = '#fff'; ctx.font = 'bold 36px sans-serif'; ctx.textAlign = 'center';
        ctx.fillText(t('sim_title'), canvas.width / 2, canvas.height / 2 - 80);
        
        [langBtnKR, langBtnEN, langBtnJP].forEach(btn => {
            ctx.fillStyle = (currentLanguage === btn.lang) ? '#f77f00' : '#4cc9f0'; 
            ctx.fillRect(btn.x, btn.y, btn.width, btn.height);
            ctx.fillStyle = '#fff'; ctx.font = 'bold 16px sans-serif'; ctx.textAlign = 'center';
            ctx.fillText(btn.text, btn.x + btn.width/2, btn.y + 30);
        });

        ctx.fillStyle = '#4cc9f0'; ctx.fillRect(startButton.x, startButton.y, startButton.width, startButton.height);
        ctx.fillStyle = '#fff'; ctx.font = 'bold 16px sans-serif'; ctx.textAlign = 'center';
        ctx.fillText(t('start'), startButton.x + startButton.width/2, startButton.y + 25);

        ctx.font = '16px sans-serif'; ctx.fillStyle = '#aaa';
        ctx.fillText(t('sim_desc'), canvas.width / 2, canvas.height / 2 + 130);

        ctx.fillStyle = '#888'; ctx.font = '14px sans-serif'; ctx.textAlign = 'right';
        ctx.fillText("@GIMMOMO/뽀쨔@톤베리 제작", canvas.width - 20, canvas.height - 40);
        ctx.fillText("문의 discord : momo_gim", canvas.width - 20, canvas.height - 20);
        return;
    }

    if (isGameStarted) {
        [1, 2].forEach(index => {
            let boss = bosses[index];
            if (currentWave === 3 && isSubBossesVanished) return;
            let imgToDraw = (index === 1) ? imgChaos : imgNeo;
            let isLoaded = (index === 1) ? imagesLoaded.chaos : imagesLoaded.neo;
            if (isLoaded) ctx.drawImage(imgToDraw, boss.x - 75, boss.y - 75, 150, 150);
            else { ctx.beginPath(); ctx.arc(boss.x, boss.y, bossRadius, 0, Math.PI * 2); ctx.fillStyle = boss.color; ctx.fill(); }
        });
        if (currentWave === 3 && wave3TimelineState === "POPUP" && wave3BossB.isCasting) {
            if (imagesLoaded.neo) ctx.drawImage(imgNeo, wave3BossB.x - 75, wave3BossB.y - 75, 150, 150);
            else { ctx.beginPath(); ctx.arc(wave3BossB.x, wave3BossB.y, bossRadius, 0, Math.PI * 2); ctx.fillStyle = '#ff4500'; ctx.fill(); }
        }
    }

    if (imagesLoaded.map) {
        ctx.drawImage(imgMap, mapCenter.x - mapRadius, mapCenter.y - mapRadius, mapRadius * 2, mapRadius * 2);
    } else {
        ctx.beginPath(); ctx.arc(mapCenter.x, mapCenter.y, mapRadius, 0, Math.PI * 2);
        ctx.strokeStyle = '#555'; ctx.lineWidth = 5; ctx.stroke(); ctx.fillStyle = '#1a1a1a'; ctx.fill();
    }


    if (isGameStarted) {
        if (bosses[0].isCasting && bosses[0].castName !== "두근두근 알테마") drawAoELayers(0.40, 0.50); 
        else if (bossA_Gimmick.showAoE) drawAoELayers(0.80, 0.85); 
        
        if (thunderga_Gimmick.isCasting) drawThundergaAoELayer(thunderga_Gimmick.thunderPattern, 0.40);
        else if (thunderga_Gimmick.showAoE) drawThundergaAoELayer(thunderga_Gimmick.thunderPattern, 0.80);

        if (blizzaga_Gimmick.isCasting) drawBlizzagaAoELayer(blizzaga_Gimmick.blizzardPattern, 0.40);
        else if (blizzaga_Gimmick.showAoE) drawBlizzagaAoELayer(blizzaga_Gimmick.blizzardPattern, 0.80);

        drawFinalMemoryAoE();

        subBossPlacedAoEs.forEach(aoe => {
            if (aoe.showVisual) {
                ctx.save();
                ctx.fillStyle = 'rgba(255, 69, 0, 0.45)'; 
                ctx.strokeStyle = '#ff4500';
                ctx.lineWidth = 3;
                if (aoe.shape === "CIRCLE") {
                    ctx.beginPath(); ctx.arc(aoe.x, aoe.y, 80, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
                } else if (aoe.shape === "DONUT") {
                    ctx.beginPath(); ctx.arc(aoe.x, aoe.y, 220, 0, Math.PI * 2);
                    ctx.arc(aoe.x, aoe.y, 80, 0, Math.PI * 2, true); 
                    ctx.fill(); ctx.stroke();
                }
                ctx.restore();
            }
        });

        if (currentWave === 3) drawWave3SplitAoE();
    }

    explosionVisuals.forEach(vis => {
        ctx.save(); ctx.beginPath(); ctx.arc(vis.x, vis.y, vis.radius, 0, Math.PI * 2);
        ctx.strokeStyle = vis.color ? vis.color : `rgba(0, 180, 216, ${vis.alpha})`;
        ctx.lineWidth = 4; ctx.stroke(); ctx.restore();
    });

    bosses.forEach((boss, index) => {
        if (currentWave === 3 && isSubBossesVanished && index > 0) return;

        let isInterfaceActive = boss.isCasting || (index === 0 && (thunderga_Gimmick.isCasting || blizzaga_Gimmick.isCasting || finalMemoryState.showRings)) || (boss.castCompleteTime && (Date.now() - boss.castCompleteTime < 2000));
        if (index === 0) {
            if (imagesLoaded.kefka) {
                ctx.drawImage(imgKefka, boss.x - 75, boss.y - 95, 150, 150);
            } else {
                ctx.beginPath(); ctx.arc(boss.x, boss.y, bossRadius, 0, Math.PI * 2);
                ctx.fillStyle = boss.color; ctx.fill(); ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
            }
        }

        if (isInterfaceActive) {
            if (index === 0) {
                if (finalMemoryState.showRings) drawFinalMemoryRings(boss.x, boss.y);
                else if (boss.castName !== "두근두근 알테마") drawCenterBossRings(boss.x, boss.y);
            } else {
                ctx.save(); ctx.translate(boss.x, boss.y);
                const ringRadiusX = 45; const ringRadiusY = 15; const size = 20;
                ctx.strokeStyle = 'rgba(0, 180, 216, 0.35)'; ctx.lineWidth = 6;
                ctx.beginPath(); ctx.ellipse(0, 0, ringRadiusX, ringRadiusY, 0, 0, Math.PI * 2); ctx.stroke();
                ctx.strokeStyle = '#00f5d4'; ctx.lineWidth = 2; ctx.stroke();
                if (imagesLoaded.truth && imagesLoaded.fake) {
                    let subImg = boss.currentEffect === '진실' ? imgTruth : imgFake;
                    ctx.drawImage(subImg, -ringRadiusX - size/2, -size/2, size, size); ctx.drawImage(subImg, ringRadiusX - size/2, -size/2, size, size);
                } else {
                    ctx.fillStyle = boss.currentEffect === '진실' ? '#00b4d8' : '#ff4444';
                    ctx.fillRect(-ringRadiusX - 5, -5, 10, 10); ctx.fillRect(ringRadiusX - 5, -5, 10, 10);
                }
                ctx.restore();
            }
            
            const barW = 100; const barH = 10; const barX = boss.x - barW / 2; 
            let barY = boss.y - bossRadius - 25;
            if (index === 0) barY -= 30;
            
            if (boss.isCasting && boss.castName) {
                ctx.save(); ctx.fillStyle = '#fff'; ctx.font = '11px sans-serif'; ctx.textAlign = 'center';
                ctx.fillText(getLocalEffect(boss.castName), boss.x, barY - 5); ctx.restore();
            }

            ctx.fillStyle = '#000'; ctx.fillRect(barX, barY, barW, barH);
            
            if (index === 0 && thunderga_Gimmick.isCasting) {
                ctx.fillStyle = '#bf55ec'; 
                ctx.fillRect(barX, barY, barW * thunderga_Gimmick.progress, barH);
            } else if (index === 0 && blizzaga_Gimmick.isCasting) {
                ctx.fillStyle = '#00b4d8'; 
                ctx.fillRect(barX, barY, barW * blizzaga_Gimmick.progress, barH);
            } else if (index === 0 && finalMemoryState.isCasting) {
                let progress = Math.min((Date.now() - finalMemoryState.castStartTime) / 3000, 1);
                ctx.fillStyle = '#f77f00'; 
                ctx.fillRect(barX, barY, barW * progress, barH);
            } else {
                ctx.fillStyle = boss.progress >= 1 ? '#ff3333' : '#ffaa00'; ctx.fillRect(barX, barY, barW * boss.progress, barH);
            }
            ctx.strokeStyle = '#888'; ctx.lineWidth = 1; ctx.strokeRect(barX, barY, barW, barH);
        }
    });

    if (currentWave === 3 && wave3TimelineState === "POPUP" && wave3BossB.isCasting) {
        // Body is drawn before map

        ctx.save(); ctx.translate(wave3BossB.x, wave3BossB.y);
        const ringRadiusX = 45; const ringRadiusY = 15; const size = 20;
        ctx.strokeStyle = 'rgba(255, 69, 0, 0.4)'; ctx.lineWidth = 6;
        ctx.beginPath(); ctx.ellipse(0, 0, ringRadiusX, ringRadiusY, 0, 0, Math.PI * 2); ctx.stroke();
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();

        if (imagesLoaded.truth && imagesLoaded.fake) {
            let subImg = wave3BossB.currentEffect === '진실' ? imgTruth : imgFake;
            ctx.drawImage(subImg, -ringRadiusX - size/2, -size/2, size, size); ctx.drawImage(subImg, ringRadiusX - size/2, -size/2, size, size);
        }
        ctx.restore();

        const barW = 100; const barH = 10; const barX = wave3BossB.x - barW / 2; const barY = wave3BossB.y - bossRadius - 25;
        ctx.fillStyle = '#000'; ctx.fillRect(barX, barY, barW, barH);
        ctx.fillStyle = '#ffaa00'; ctx.fillRect(barX, barY, barW * wave3BossB.progress, barH);
        ctx.strokeStyle = '#fff'; ctx.strokeRect(barX, barY, barW, barH);
    }

    if (!player.isDead) {
        let angle = Math.atan2(player.lastDy, player.lastDx);
        ctx.beginPath();
        ctx.moveTo(player.x + Math.cos(angle) * (player.radius * 1.5), player.y + Math.sin(angle) * (player.radius * 1.5));
        ctx.lineTo(player.x + Math.cos(angle + 2.4) * player.radius, player.y + Math.sin(angle + 2.4) * player.radius);
        ctx.lineTo(player.x + Math.cos(angle - 2.4) * player.radius, player.y + Math.sin(angle - 2.4) * player.radius);
        ctx.closePath();
        ctx.fillStyle = player.color; ctx.fill(); ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
    } else {
        ctx.strokeStyle = '#ff3333'; ctx.lineWidth = 4; ctx.beginPath();
        ctx.moveTo(player.x - 15, player.y - 15); ctx.lineTo(player.x + 15, player.y + 15);
        ctx.moveTo(player.x + 15, player.y - 15); ctx.lineTo(player.x - 15, player.y + 15);
        ctx.stroke(); 
    }

    ctx.fillStyle = '#fff'; ctx.font = 'bold 20px sans-serif'; ctx.textAlign = 'left';
    ctx.fillText(`Time: ${elapsedTimeDisplay}s`, 30, 50);

    if (isGameStarted && !isGameOver && !isGameCleared) {
        
        
        if (showDebugText) {
            let guideLines = [];
            
            let envDebuffs = activeDebuffs.filter(d => (d.type === "WATER" || d.type === "THUNDER" || d.type === "BOMB") && !d.processed);
            let activeEnv = envDebuffs.length > 0 ? envDebuffs.reduce((min, curr) => curr.timeLeft < min.timeLeft ? curr : min) : null;
            let envTime = activeEnv ? activeEnv.timeLeft : 0;
            if (activeEnv) {
                let envDisplay = envTime >= 60 ? Math.floor(envTime/60) + 'm' : envTime + 's';
                guideLines.push({ text: `(${t("guide_env") || "쉐어/산개 + 가속도 만료"}: ${envDisplay})`, color: '#00b4d8' });
            }

            let pendingEyes = backgroundEyes.filter(e => !e.processed);
            pendingEyes.forEach((pendingEye, idx) => {
                let eyeTimeLeft = Math.max(pendingEye.initialDuration - Math.floor((Date.now() - pendingEye.assignTime)/1000), 0);
                let eyeAction = pendingEye.rule === "진실" ? t("hide") : t("look");
                let eyeDisplay = eyeTimeLeft >= 60 ? Math.floor(eyeTimeLeft/60) + 'm' : eyeTimeLeft + 's';
                guideLines.push({ text: `(Wave ${pendingEye.wave} Eye [${eyeAction}]: ${eyeDisplay})`, color: '#bf55ec' });
            });

            if (thunderga_Gimmick.isCasting) {
                guideLines.push({ text: `(${t("guide_thunderga")}... [${getLocalEffect(thunderga_Gimmick.effect)}])`, color: '#ffd700' });
            }

            if (blizzaga_Gimmick.isCasting) {
                guideLines.push({ text: `(${t("guide_blizzaga")}... [${getLocalEffect(blizzaga_Gimmick.effect)}])`, color: '#00b4d8' });
            }

            if (pastThundergaTruth || pastBlizzagaTruth) {
                let pThunder = pastThundergaTruth ? getLocalEffect(pastThundergaTruth) : "?";
                let pBlizza = pastBlizzagaTruth ? getLocalEffect(pastBlizzagaTruth) : "?";
                guideLines.push({ text: `(${t("guide_memory")}[${pThunder}] / ${t("guide_memory_blizzard")}[${pBlizza}])`, color: '#ffffff' });
            }

            if (guideLines.length > 0) {
                ctx.save();
                ctx.font = 'bold 14px sans-serif';
                let boxPadding = 15;
                let lineHeight = 25;
                let boxHeight = boxPadding * 2 + (guideLines.length - 1) * lineHeight + 14;
                let maxTextWidth = Math.max(...guideLines.map(g => ctx.measureText(g.text).width));
                let boxWidth = maxTextWidth + boxPadding * 2;
                
                let boxX = canvas.width - boxWidth - 20;
                let boxY = canvas.height - boxHeight - 30;
                
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(boxX, boxY, boxWidth, boxHeight);
                ctx.strokeStyle = '#555';
                ctx.lineWidth = 2;
                ctx.strokeRect(boxX, boxY, boxWidth, boxHeight);
                
                ctx.textAlign = 'right';
                ctx.textBaseline = 'top';
                guideLines.forEach((g, i) => {
                    ctx.fillStyle = g.color;
                    ctx.fillText(g.text, boxX + boxWidth - boxPadding, boxY + boxPadding + i * lineHeight);
                });
                ctx.restore();
            }
        }

        ctx.fillStyle = showDebugText ? '#4cc9f0' : '#777'; 
        ctx.fillRect(toggleButton.x, toggleButton.y, toggleButton.width, toggleButton.height);
        ctx.fillStyle = '#fff'; ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'center';
        ctx.fillText(showDebugText ? t('guide_on') : t('guide_off'), toggleButton.x + toggleButton.width/2, toggleButton.y + 22);

        ctx.fillStyle = '#ff4444'; ctx.fillRect(resetButton.x, resetButton.y, resetButton.width, resetButton.height);
        ctx.fillStyle = '#fff'; ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'center';
        ctx.fillText(t('reset'), resetButton.x + resetButton.width/2, resetButton.y + 22);
    }

    if (isGameStarted) {
        let visibleDebuffs = activeDebuffs.filter(d => !d.processed);
        if (visibleDebuffs.length > 0) {
            const debuffOrder = { "DEAD_SCAR": 1, "LIVE_SCAR": 1, "ALAG": 2, "TRANSCEND": 2, "EYE": 3, "THUNDER": 4, "WATER": 4, "BOMB": 5, "FLAME": 6, "FLOOD": 6 };
            visibleDebuffs.sort((a, b) => (debuffOrder[a.type] || 99) - (debuffOrder[b.type] || 99));
            
            const rightMarginX = 760;
            const gap = 42;          
            const topStartX = rightMarginX - (visibleDebuffs.length - 1) * gap;
            const topStartY = 30;
            const iconSize = 28; 

            visibleDebuffs.forEach((debuff, index) => {
                let currentX = topStartX + (index * gap);
                let currentY = topStartY;

                if (imagesLoaded[debuff.loadKey]) {
                    ctx.drawImage(debuff.img, currentX, currentY, iconSize, iconSize);
                } else {
                    ctx.fillStyle = debuff.color; ctx.fillRect(currentX, currentY, iconSize, iconSize);
                    ctx.fillStyle = '#fff'; ctx.font = 'bold 8px sans-serif'; ctx.textAlign = 'center';
                    ctx.fillText(debuff.type, currentX + iconSize/2, currentY + 18);
                }

                if (showDebugText) {
                    ctx.save(); ctx.font = 'bold 12px sans-serif'; ctx.textAlign = 'center';
                    let textResult = debuff.actionText;

                    if (currentWave === 3 && wave3TimelineState === "POPUP" && textResult === "CALC" && activeDebuffs.length >= 2) {
                        let colorDebuff = activeDebuffs.find(d => d.type === "DEAD_SCAR" || d.type === "LIVE_SCAR");
                        let hitDebuff = activeDebuffs.find(d => d.type === "ALAG" || d.type === "TRANSCEND");
                        if (colorDebuff && hitDebuff) {
                            let isBlue = colorDebuff.type === "DEAD_SCAR";
                            let isAlag = hitDebuff.type === "ALAG";
                            if (wave3BossB.currentEffect === "거짓") isAlag = !isAlag;
                            textResult = isAlag ? (isBlue ? "분홍맞기" : "파란맞기") : (isBlue ? "파란맞기" : "분홍맞기");
                        }
                    }

                    let krWord = "";
                    if (textResult === "SHARE") { krWord = t("share"); ctx.fillStyle = '#4ec9b0'; }
                    else if (textResult === "SPREAD") { krWord = t("spread"); ctx.fillStyle = '#f77f00'; }
                    else if (textResult === "LOOK") { krWord = t("look"); ctx.fillStyle = '#a2d2ff'; }
                    else if (textResult === "HIDE") { krWord = t("hide"); ctx.fillStyle = '#bf55ec'; }
                    else if (textResult === "MOVE") { krWord = t("move"); ctx.fillStyle = '#ffcc00'; }
                    else if (textResult === "STOP") { krWord = t("stop"); ctx.fillStyle = '#ff4444'; }
                    else if (textResult === "물압축") { krWord = t("water_compress"); ctx.fillStyle = '#00b4d8'; }
                    else if (textResult === "갈래번개") { krWord = t("fork_lightning"); ctx.fillStyle = '#bf55ec'; }
                    else if (textResult === "해일") { krWord = (debuff.rule === "진실") ? t("donut") : t("circle"); ctx.fillStyle = '#00b4d8'; } 
                    else if (textResult === "화염") { krWord = (debuff.rule === "진실") ? t("circle") : t("donut"); ctx.fillStyle = '#ff4500'; } 
                    else if (textResult === "파란맞기") { krWord = t("hit_blue"); ctx.fillStyle = '#00b4d8'; }
                    else if (textResult === "분홍맞기") { krWord = t("hit_pink"); ctx.fillStyle = '#ff69b4'; }
                    else if (textResult === "CALC") { krWord = t("boss_analyzing"); ctx.fillStyle = '#bbb'; }

                    let textX = currentX + iconSize/2;
                    if (textResult === "파란맞기" || textResult === "분홍맞기" || textResult === "CALC") {
                        if (debuff.type === "DEAD_SCAR" || debuff.type === "LIVE_SCAR") {
                            textX = currentX + iconSize/2 + gap/2;
                        } else if (debuff.type === "ALAG" || debuff.type === "TRANSCEND") {
                            krWord = "";
                        }
                    }

                    if (krWord !== "") {
                        ctx.fillText(krWord, textX, currentY - 10);
                    }
                    ctx.restore();
                }

                ctx.save(); ctx.font = 'bold 12px sans-serif'; ctx.textAlign = 'center';
                let tDisp = debuff.timeLeft >= 60 ? Math.floor(debuff.timeLeft/60) + 'm' : debuff.timeLeft;
                ctx.strokeStyle = '#000000'; ctx.lineWidth = 3; ctx.strokeText(tDisp, currentX + iconSize/2, currentY + iconSize + 15);
                ctx.fillStyle = '#ffffff'; ctx.fillText(tDisp, currentX + iconSize/2, currentY + iconSize + 15); ctx.restore();
            });
        }
    }


    if (isGameOver || isGameCleared) {
        if (isGameOver) {
            ctx.fillStyle = '#ff3333'; ctx.font = 'bold 22px sans-serif'; ctx.textAlign = 'center';
            ctx.fillText(t("death_reason") + ": " + deathReason, mapCenter.x, mapCenter.y - 80);
        } else {
            ctx.fillStyle = '#4ec9b0'; ctx.font = 'bold 36px sans-serif'; ctx.textAlign = 'center';
            ctx.fillText(t('phase_clear'), mapCenter.x, mapCenter.y - 80);
        }

        ctx.fillStyle = '#f77f00'; ctx.fillRect(retryButton.x, retryButton.y, retryButton.width, retryButton.height);
        ctx.fillStyle = '#fff'; ctx.font = 'bold 16px sans-serif'; ctx.textAlign = 'center';
        ctx.fillText(t('retry'), retryButton.x + retryButton.width/2, retryButton.y + 30);
    }



    if (isPaused) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 40px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText("PAUSED", canvas.width / 2, canvas.height / 2);
    }
}

function update() {
    let dx = 0; let dy = 0;
    if (!player.isDead) {
        if (keys['w'] || keys['arrowup']) { player.y -= player.speed; dy = -1; }
        if (keys['s'] || keys['arrowdown']) { player.y += player.speed; dy = 1; }
        if (keys['a'] || keys['arrowleft']) { player.x -= player.speed; dx = -1; }
        if (keys['d'] || keys['arrowright']) { player.x += player.speed; dx = 1; }
        if (dx !== 0 || dy !== 0) { player.lastDx = dx; player.lastDy = dy; }
    }
    const distance = Math.hypot(player.x - mapCenter.x, player.y - mapCenter.y);
    if (distance + player.radius > mapRadius) {
        const angle = Math.atan2(player.y - mapCenter.y, player.x - mapCenter.x);
        player.x = mapCenter.x + Math.cos(angle) * (mapRadius - player.radius);
        player.y = mapCenter.y + Math.sin(angle) * (mapRadius - player.radius);
    }
    explosionVisuals.forEach(vis => { vis.radius += 2.5; vis.alpha -= 0.02; });
    explosionVisuals = explosionVisuals.filter(vis => vis.alpha > 0);

    if (!isGameStarted || isGameOver || isGameCleared) return;
    const now = Date.now();
    elapsedTimeDisplay = ((now - globalStartTime) / 1000).toFixed(1);

    activeDebuffs.forEach(debuff => {
        debuff.timeLeft = Math.max(debuff.initialDuration - Math.floor((now - debuff.assignTime) / 1000), 0);
        if (debuff.timeLeft === 0 && !debuff.processed) processDebuffTrigger(debuff);
    });

    drawVirtualTimerIndicator();

    subBossPlacedAoEs.forEach(aoe => {
        if (now >= aoe.detonationTime && !aoe.judged) {
            aoe.judged = true;
            aoe.showVisual = true;
            aoe.visualEndTime = now + 1500; 
            evaluateSubBossAoESafety(aoe);
        }
    });
    subBossPlacedAoEs = subBossPlacedAoEs.filter(aoe => !aoe.visualEndTime || now < aoe.visualEndTime);

    if (thunderga_Gimmick.isCasting) {
        thunderga_Gimmick.progress = Math.min((now - thunderga_Gimmick.startTime) / thunderga_Gimmick.duration, 1);
        if (thunderga_Gimmick.progress >= 1) {
            thunderga_Gimmick.isCasting = false;
            thunderga_Gimmick.showAoE = true;
            thunderga_Gimmick.aoeStartTime = now;
            checkThundergaSafety();
        }
    }
    if (thunderga_Gimmick.showAoE && now - thunderga_Gimmick.aoeStartTime > 1500) {
        thunderga_Gimmick.showAoE = false;
    }

    if (blizzaga_Gimmick.isCasting) {
        blizzaga_Gimmick.progress = Math.min((now - blizzaga_Gimmick.startTime) / blizzaga_Gimmick.duration, 1);
        if (blizzaga_Gimmick.progress >= 1) {
            blizzaga_Gimmick.isCasting = false;
            blizzaga_Gimmick.showAoE = true;
            blizzaga_Gimmick.aoeStartTime = now;
            checkBlizzagaSafety();
        }
    }
    if (blizzaga_Gimmick.showAoE && now - blizzaga_Gimmick.aoeStartTime > 1500) {
        blizzaga_Gimmick.showAoE = false;
    }

    if (finalMemoryState.showRings && now - finalMemoryState.ringStartTime > 5000) {
        finalMemoryState.showRings = false;
    }

    if (currentWave === 3) {
        if (wave3TimelineState === "CAST_DONE") {
            if (now - wave3TimerAnchor >= 2000) {
                wave3TimelineState = "VANISHED";
                isSubBossesVanished = true; 
                wave3TimerAnchor = now;     
            }
        } 
        else if (wave3TimelineState === "VANISHED") {
            if (now - wave3TimerAnchor >= 2000) {
                wave3TimelineState = "POPUP";
                const random8Index = Math.floor(Math.random() * 8);
                const randomAngle = (random8Index * Math.PI) / 4;
                const spawnRadius = mapRadius + 20;
                let bossTruthRule = effectTypes[Math.floor(Math.random() * 2)];

                wave3BossB = {
                    x: mapCenter.x + Math.cos(randomAngle) * spawnRadius,
                    y: mapCenter.y + Math.sin(randomAngle) * spawnRadius,
                    angle: randomAngle,
                    isCasting: true,
                    startTime: now,
                    duration: 5000, 
                    progress: 0,
                    showAoE: true,
                    currentEffect: bossTruthRule,
                    isPinkRight: Math.random() < 0.5
                };
            }
        }
        else if (wave3TimelineState === "POPUP" && wave3BossB.isCasting) {
            wave3BossB.progress = Math.min((now - wave3BossB.startTime) / wave3BossB.duration, 1);
            if (wave3BossB.progress >= 1) {
                wave3BossB.isCasting = false;
                checkWave3SplitSafety(); 
            }
        }
        
        if (isSubBossesVanished && !wave3BossB.isCasting && !player.isDead) {
            let elapsedSec = (now - globalStartTime) / 1000;
            finalPhaseTimeline.forEach(evt => {
                if (!evt.triggered && elapsedSec >= evt.t) {
                    evt.triggered = true;
                    if (evt.t === 51) executeEnvironmentCheck(51);
                    else if (evt.t === 53) {
                        thunderga_Gimmick.isCasting = true;
                        thunderga_Gimmick.startTime = Date.now();
                        thunderga_Gimmick.progress = 0;
                        thunderga_Gimmick.effect = effectTypes[Math.floor(Math.random() * 2)]; 
                        thunderga_Gimmick.thunderPattern = Math.floor(Math.random() * 4); 
                        thunderga_Gimmick.judged = false;
                        thunderga_Gimmick.showAoE = false;
                        pastThundergaTruth = thunderga_Gimmick.effect;
                    }
                    else if (evt.t === 57) {
                        let targetEye = backgroundEyes.find(e => e.wave === 1 && !e.processed);
                        if (targetEye) executeSingleEyeCheck(targetEye);
                    }
                    else if (evt.t === 70) {
                        blizzaga_Gimmick.isCasting = true;
                        blizzaga_Gimmick.startTime = Date.now();
                        blizzaga_Gimmick.progress = 0;
                        blizzaga_Gimmick.effect = effectTypes[Math.floor(Math.random() * 2)]; 
                        blizzaga_Gimmick.blizzardPattern = Math.floor(Math.random() * 2); 
                        blizzaga_Gimmick.judged = false;
                        blizzaga_Gimmick.showAoE = false;
                        pastBlizzagaTruth = blizzaga_Gimmick.effect;
                    }
                    else if (evt.t === 74) executeEnvironmentCheck(74);
                    else if (evt.t === 79) {
                        let targetEye = backgroundEyes.find(e => e.wave === 2 && !e.processed);
                        if (targetEye) executeSingleEyeCheck(targetEye);

                        finalMemoryState.showRings = true;
                        finalMemoryState.ringStartTime = Date.now();
                        finalMemoryState.topTruth = effectTypes[Math.floor(Math.random() * 2)];
                        finalMemoryState.bottomTruth = effectTypes[Math.floor(Math.random() * 2)];
                    }
                    else if (evt.t === 84) {
                        finalMemoryState.isCasting = true;
                        finalMemoryState.castStartTime = Date.now();
                        finalMemoryState.thunderPattern = Math.floor(Math.random() * 4);
                        finalMemoryState.blizzardPattern = Math.floor(Math.random() * 2);
                    }
                    else if (evt.t === 87) {
                        checkFinalMemorySafety();
                        finalMemoryState.isCasting = false;
                    }
                    else if (evt.t === 90) {
                        if (!player.isDead) isGameCleared = true;
                    }
                }
            });
        }
    }

    bosses.forEach((boss, index) => {
        if (boss.isCasting) {
            boss.progress = Math.min((now - boss.startTime) / boss.duration, 1);
            if (boss.progress >= 1) {
                boss.isCasting = false; boss.castCompleteTime = now;
                if (index === 0) {
                    if (boss.castName === "두근두근 알테마") {
                        boss.castName = "";
                    } else {
                        bossA_Gimmick.showAoE = true; bossA_Gimmick.aoeStartTime = now; checkSafety(); 
                        if (!player.isDead && currentWave < 3) { 
                            bosses[1].startTime = now; bosses[1].progress = 0; bosses[1].isCasting = true; bosses[1].castCompleteTime = null; 
                        }
                    }
                }
                if (index === 1 && !player.isDead) {
                    assign11BossDebuff(currentWave); 
                    currentWave++; randomizeGimmick();
                    bosses[0].startTime = now; bosses[0].progress = 0; bosses[0].isCasting = true; bosses[0].castCompleteTime = null;
                    bosses[2].startTime = now; bosses[2].progress = 0; bosses[2].isCasting = true; bosses[2].castCompleteTime = null;
                }
                if (index === 2 && !player.isDead) {
                    assignGimmickDebuffs(currentWave);
                }
            }
        }
    });
    if (bossA_Gimmick.showAoE && now - bossA_Gimmick.aoeStartTime > 2000) bossA_Gimmick.showAoE = false;
}

function gameLoop() { if (!isPaused) update(); draw(); requestAnimationFrame(gameLoop); }
gameLoop();
</script>
