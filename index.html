let currentLanguage = 'ko';
try {
    const storedLanguage = localStorage.getItem(LANGUAGE_STORAGE_KEY);
    if (SUPPORTED_LANGUAGES[storedLanguage]) currentLanguage = storedLanguage;
    else {
        const browserLanguage = (navigator.languages && navigator.languages.length > 0)
            ? navigator.languages[0]
            : navigator.language;
        currentLanguage = typeof browserLanguage === 'string' && browserLanguage.toLowerCase().startsWith('ja') ? 'ja' : 'ko';
    }
} catch (err) {
    const browserLanguage = (navigator.languages && navigator.languages.length > 0)
        ? navigator.languages[0]
        : navigator.language;
    currentLanguage = typeof browserLanguage === 'string' && browserLanguage.toLowerCase().startsWith('ja') ? 'ja' : 'ko';
}
document.documentElement.lang = currentLanguage;
document.title = t('ui.title');

function t(path, vars = {}) {
    const segments = path.split('.');
    let value = TEXTS[currentLanguage];
    for (const segment of segments) {
        value = value?.[segment];
        if (value == null) return path;
    }
    if (typeof value !== 'string') return path;
    return value.replace(/\{(\w+)\}/g, (_, key) => vars[key] ?? '');
}

function setLanguage(nextLanguage) {
    if (!SUPPORTED_LANGUAGES[nextLanguage]) return;
    currentLanguage = nextLanguage;
    document.documentElement.lang = nextLanguage;
    document.title = t('ui.title');
    syncStartOverlay();
    try {
        localStorage.setItem(LANGUAGE_STORAGE_KEY, nextLanguage);
    } catch (err) {
        // localStorage may be unavailable for file:// access.
    }
}

function syncStartOverlay() {
    if (!startOverlay) return;
    startTitle.textContent = t('ui.title');
    languagePrompt.textContent = t('ui.languagePrompt');
    startGameButton.textContent = t('ui.start');
    startKeys.textContent = t('ui.startKeys');
    startHint.textContent = t('ui.startHint');
    creditsLine.innerHTML = t('ui.credits');
    contactLine.innerHTML = t('ui.contact');
    langKoButton.classList.toggle('active', currentLanguage === 'ko');
    langJaButton.classList.toggle('active', currentLanguage === 'ja');
}

langKoButton.addEventListener('click', () => setLanguage('ko'));
langJaButton.addEventListener('click', () => setLanguage('ja'));
startGameButton.addEventListener('click', () => resetGame());
syncStartOverlay();

function actionLabel(actionText) {
    switch (actionText) {
        case 'SHARE': return t('action.share');
        case 'SPREAD': return t('action.spread');
        case 'LOOK': return t('action.look');
        case 'HIDE': return t('action.hide');
        case 'MOVE': return t('action.move');
        case 'STOP': return t('action.stop');
        case 'CALC': return t('action.calc');
        case '파란맞기': return t('action.blueHit');
        case '분홍맞기': return t('action.pinkHit');
        default: return actionText;
    }
}

function effectLabel(effectText) {
    if (effectText === '진실') return currentLanguage === 'ja' ? '真' : '진실';
    if (effectText === '거짓') return currentLanguage === 'ja' ? '偽' : '거짓';
    return effectText;
}

function bossCastLabel(castName) {
    switch (castName) {
        case '해일': return t('boss.flood');
        case '불꽃': return t('boss.flame');
        default: return castName;
    }
}

function getPendingShareDebuff() {
    const candidate = activeDebuffs.find(d => (d.type === "WATER" || d.type === "THUNDER") && !d.processed && d.timeLeft <= 2);
    if (!candidate) return null;
    const isShare = candidate.type === "WATER" ? candidate.rule === "진실" : candidate.rule !== "진실";
    return isShare ? candidate : null;
}

function getGuideHintText() {
    const pendingShare = getPendingShareDebuff();
    if (pendingShare) {
        return currentLanguage === 'ja' ? '頭割りデバフを見る' : '쉐어 디버프 확인';
    }

    if (currentWave === 3) {
        const colorDebuff = activeDebuffs.find(d => d.type === "DEAD_SCAR" || d.type === "LIVE_SCAR");
        const hitDebuff = activeDebuffs.find(d => d.type === "ALAG" || d.type === "TRANSCEND");
        if (colorDebuff && hitDebuff) {
            return currentLanguage === 'ja' ? '青/ピンクのデバフとアラガンを見る' : '파란/분홍 디버프와 아라간 확인';
        }
    }

    const activeEnv = activeDebuffs.find(d => (d.type === "WATER" || d.type === "THUNDER" || d.type === "BOMB") && !d.processed);
    if (activeEnv) {
        if (activeEnv.type === "BOMB") {
            return currentLanguage === 'ja' ? '加速度爆弾を見る' : '가속도 폭탄 확인';
        }
        return currentLanguage === 'ja' ? '水/雷デバフを見る' : '물/번개 디버프 확인';
    }

    return currentLanguage === 'ja' ? '次のデバフを確認' : '다음 디버프 확인';
}

function drawGuideHintPanel(x, y, width) {
    const panelWidth = width || 320;
    const padding = 12;
    const lineHeight = 22;
    const lines = [];

    const activeEnv = activeDebuffs.find(d => (d.type === "WATER" || d.type === "THUNDER" || d.type === "BOMB") && !d.processed);
    const envTime = activeEnv ? activeEnv.timeLeft : 0;
    const pendingEyes = backgroundEyes.filter(e => !e.processed);

    lines.push({ text: t('ui.watchHint', { hint: getGuideHintText() }), color: '#9ee7ff' });

    if (activeEnv) {
        lines.push({ text: t('ui.guideTimer', { seconds: envTime }), color: '#00b4d8' });
    }

    pendingEyes.forEach((pendingEye) => {
        const eyeTimeLeft = Math.max(pendingEye.initialDuration - Math.floor((Date.now() - pendingEye.assignTime) / 1000), 0);
        const eyeAction = pendingEye.rule === "진실" ? t('action.hide') : t('action.look');
        lines.push({ text: t('ui.eyeTimer', { wave: pendingEye.wave, action: eyeAction, seconds: eyeTimeLeft }), color: '#bf55ec' });
    });

    if (thunderga_Gimmick.isCasting) {
        lines.push({ text: t('ui.thunderCasting', { effect: effectLabel(thunderga_Gimmick.effect) }), color: '#ffd700' });
    }

    if (lines.length === 0) return;

    const totalHeight = padding * 2 + lines.length * lineHeight;
    const startX = Math.max(12, x - panelWidth);
    const startY = Math.max(12, y - totalHeight);

    ctx.save();
    ctx.fillStyle = 'rgba(0, 0, 0, 0.28)';
    ctx.fillRect(startX, startY, panelWidth, totalHeight);
    ctx.font = '13px sans-serif';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';

    lines.forEach((line, index) => {
        ctx.fillStyle = line.color;
        ctx.fillText(line.text, startX + padding, startY + padding + lineHeight * index + lineHeight / 2);
    });

    ctx.restore();
}

function drawDebuffActionLabel(text, x, y, color) {
    ctx.save();
    ctx.font = 'bold 9px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    ctx.fillStyle = color;
    ctx.fillText(text, x, y - 4);
    ctx.restore();
}

function wrapText(text, maxWidth) {
    const lines = [];
    let currentLine = '';

    for (const char of text) {
        const testLine = currentLine + char;
        if (currentLine && ctx.measureText(testLine).width > maxWidth) {
            lines.push(currentLine);
            currentLine = char;
        } else {
            currentLine = testLine;
        }
    }

    if (currentLine) lines.push(currentLine);
    return lines;
}

function deathMessage(key, vars = {}) {
    triggerPlayerDeath(t(`death.${key}`, vars));
}

function isButtonHit(button, mouseX, mouseY) {
    return mouseX >= button.x && mouseX <= button.x + button.width &&
        mouseY >= button.y && mouseY <= button.y + button.height;
}

const retryButton = { x: 320, y: 380, width: 160, height: 50 };
const toggleButton = { x: 30, y: 695, width: 120, height: 35 };
const resetButton = { x: 30, y: 740, width: 120, height: 35 };

function checkFinalMemorySafety() {
    if (player.isDead) return;

    let pastThundergaVal = pastThundergaTruth === '진실' ? 1 : -1;
    let futureThundergaVal = finalMemoryState.topTruth === '진실' ? 1 : -1;
    let finalThundergaIsTruth = (pastThundergaVal * futureThundergaVal) === 1;

    let pastBlizzagaVal = pastBlizzagaTruth === '진실' ? 1 : -1;
    let futureBlizzagaVal = finalMemoryState.bottomTruth === '진실' ? 1 : -1;
    let finalBlizzagaIsTruth = (pastBlizzagaVal * futureBlizzagaVal) === 1;

    const px = player.x - mapCenter.x; const py = player.y - mapCenter.y;
    
    let inBlizzardAoE = false;
    if (finalMemoryState.blizzardPattern === 0) {
        if ((px >= 0 && py <= 0) || (px <= 0 && py >= 0)) inBlizzardAoE = true;
    } else {
        if ((px <= 0 && py <= 0) || (px >= 0 && py >= 0)) inBlizzardAoE = true;
    }

    let inThunderAoE = false;
    const rotX = (px - py) / Math.sqrt(2); const rotY = (px + py) / Math.sqrt(2); const w = 175; 
    switch(finalMemoryState.thunderPattern) {

function clampPointToArena(x, y) {
    const dx = x - mapCenter.x;
    const dy = y - mapCenter.y;
    const distance = Math.hypot(dx, dy);
    const maxDistance = mapRadius - player.radius;
    if (distance <= maxDistance || distance === 0) {
        return { x, y };
    }
    const ratio = maxDistance / distance;
    return {
        x: mapCenter.x + dx * ratio,
        y: mapCenter.y + dy * ratio
    };
}

function normalizeVector(dx, dy) {
    const length = Math.hypot(dx, dy);
    if (length === 0) return { x: 0, y: 0 };
    return { x: dx / length, y: dy / length };
}

function facingCardinalFor(dx, dy) {
    if (dx === 0 && dy === 0) return 'N';
    const angle = Math.atan2(dy, dx);
    if (angle >= -Math.PI / 4 && angle < Math.PI / 4) return 'E';
    if (angle >= Math.PI / 4 && angle < 3 * Math.PI / 4) return 'S';
    if (angle >= -3 * Math.PI / 4 && angle < -Math.PI / 4) return 'N';
    return 'W';
}

function setPlayerFacing(dx, dy) {
    const vector = normalizeVector(dx, dy);
    if (vector.x === 0 && vector.y === 0) return;
    player.facingX = vector.x;
    player.facingY = vector.y;
    player.facingCardinal = facingCardinalFor(vector.x, vector.y);
}

    let hasThunder = !!thunderDebuff;
    let hasBomb = !!bombDebuff;

    if (hasBomb) {
        let isBombTruth = (bombDebuff.rule === "진실");

    let dist9  = Math.hypot(invisibleObjects.h9.x - player.x, invisibleObjects.h9.y - player.y) < 120;

    if (isNoEnvBuff) {
        if (!dist12 && !dist6) {
            deathMessage('supportStack');

            deathMessage('supportCrush');
            return;
        } else {
            explosionVisuals.push({ x: player.x, y: player.y, radius: 10, maxRadius: 80, color: '#4ec9b0', alpha: 1 });
        }
    } else {
        let activeDebuff = waterDebuff || thunderDebuff;
        let isEnvTruth = (activeDebuff.rule === "진실");
        let finalGimmickResult = ""; 
        if (hasWater) {
            finalGimmickResult = isEnvTruth ? "SHARE" : "SPREAD"; 
        } else if (hasThunder) {
            finalGimmickResult = isEnvTruth ? "SPREAD" : "SHARE";

        if (finalGimmickResult === "SPREAD") {

            } else {
                explosionVisuals.push({ x: player.x, y: player.y, radius: 10, maxRadius: 80, color: '#00b4d8', alpha: 1 });
            }
        }
    }

    activeDebuffs.forEach(d => { if ((d.type === "WATER" || d.type === "THUNDER" || d.type === "BOMB") && d.timeLeft <= 2) d.processed = true; });
}

function checkWave3SplitSafety() {
    let colorDebuff = activeDebuffs.find(d => d.type === "DEAD_SCAR" || d.type === "LIVE_SCAR");

    const bCenterX = mapCenter.x - wave3BossB.x; const bCenterY = mapCenter.y - wave3BossB.y;
    
    const crossProduct = bCenterX * vY - bCenterY * vX;
    let standOnColor = (crossProduct >= 0) ? "PINK" : "BLUE";

    let isBlueScar = colorDebuff.type === "DEAD_SCAR";
    let isAlagField = hitDebuff.type === "ALAG";
    
    let isBossTruth = (wave3BossB.currentEffect === "진실");
    if (!isBossTruth) isAlagField = !isAlagField;

        if (isBlueScar && standOnColor !== "PINK") deathMessage('alagWrongPink');
        if (!isBlueScar && standOnColor !== "BLUE") deathMessage('alagWrongBlue');
    } else {
        if (isBlueScar && standOnColor !== "BLUE") deathMessage('transcendWrongBlue');
        if (!isBlueScar && standOnColor !== "PINK") deathMessage('transcendWrongPink');
    }

    if (!player.isDead) {
        explosionVisuals.push({ x: player.x, y: player.y, radius: 10, maxRadius: 100, color: standOnColor === "BLUE" ? '#00b4d8' : '#ff69b4', alpha: 1 });
    }

function processDebuffTrigger(debuff) {
    if (debuff.processed || player.isDead) return;
    if (debuff.type === "DEAD_SCAR" || debuff.type === "LIVE_SCAR" || debuff.type === "ALAG" || debuff.type === "TRANSCEND") return;

    if (debuff.type === "FLAME" || debuff.type === "FLOOD") { 
        debuff.processed = true; 
        let targetShape = (debuff.type === "FLAME") ? (debuff.rule === "진실" ? "CIRCLE" : "DONUT") : (debuff.rule === "진실" ? "DONUT" : "CIRCLE");
        subBossPlacedAoEs.push({
            x: player.x, y: player.y, shape: targetShape, placeTime: Date.now(),
            detonationTime: Date.now() + 3000, showVisual: false, judged: false
        });
        return; 
    }

    let isTruth = (debuff.rule === "진실");

    switch(debuff.type) {
        case "WATER":
        case "THUNDER":
        case "BOMB":
            break;
        case "EYE":
            debuff.processed = true;
            let targetEye = backgroundEyes.find(e => e.initialDuration === debuff.initialDuration && !e.processed);
            if (targetEye) executeSingleEyeCheck(targetEye);
            break;
    }
}

canvas.addEventListener('click', function(e) {
    const rect = canvas.getBoundingClientRect();
    const mouseX = (e.clientX - rect.left) * (canvas.width / rect.width);
    const mouseY = (e.clientY - rect.top) * (canvas.height / rect.height);

    if (!isGameStarted) {
        return;
    }
    if (isGameStarted && !isGameOver && !isGameCleared) {
        if (isButtonHit(toggleButton, mouseX, mouseY)) {
            showDebugText = !showDebugText;
            return;
        }
        if (isButtonHit(resetButton, mouseX, mouseY)) {
            resetGame();
            return;
        }
    }
    if (isGameOver || isGameCleared) {
        if (isButtonHit(retryButton, mouseX, mouseY)) {
            resetGame();
            return;
        }
    }

    if (isGameStarted && !isGameOver && !isGameCleared) {
        player.moveTarget = clampPointToArena(mouseX, mouseY);
        setPlayerFacing(player.moveTarget.x - player.x, player.moveTarget.y - player.y);
    }
});

function evaluateCurrentPosition() {
    const px = player.x - mapCenter.x; const py = player.y - mapCenter.y;
    let inBlizzardAoE = false;
    if (bossA_Gimmick.blizzardPattern === 0) {
        if ((px >= 0 && py <= 0) || (px <= 0 && py >= 0)) inBlizzardAoE = true;
    } else {
        if ((px <= 0 && py <= 0) || (px >= 0 && py >= 0)) inBlizzardAoE = true;
    }
    let inThunderAoE = false;
    const rotX = (px - py) / Math.sqrt(2); const rotY = (px + py) / Math.sqrt(2); const w = 175; 
    switch(bossA_Gimmick.thunderPattern) {
        case 0: if ((rotX >= -w && rotX < 0) || (rotX >= w && rotX <= 2*w)) inThunderAoE = true; break;
        case 1: if ((rotX >= -2*w && rotX < -w) || (rotX >= 0 && rotX < w)) inThunderAoE = true; break;
        case 2: if ((rotY >= -w && rotY < 0) || (rotY >= w && rotY <= 2*w)) inThunderAoE = true; break;
        case 3: if ((rotY >= -2*w && rotY < -w) || (rotY >= 0 && rotY < w)) inThunderAoE = true; break;
    }
    return { inBlizzardAoE, inThunderAoE };
}

function checkSafety() {
    if (bossA_Gimmick.judged) return;
    bossA_Gimmick.judged = true;
    const currentAoE = evaluateCurrentPosition();
    if ((bossA_Gimmick.bottomEffect.includes('진실') ? currentAoE.inBlizzardAoE : !currentAoE.inBlizzardAoE) ||
        (bossA_Gimmick.topEffect.includes('진실') ? currentAoE.inThunderAoE : !currentAoE.inThunderAoE)) {
        deathMessage('finalBossAoE');
    }
}

function drawAoELayers(alpha1, alpha2) {
    ctx.save();
    ctx.fillStyle = `rgba(0, 180, 216, ${alpha1})`;
    if (bossA_Gimmick.blizzardPattern === 0) {
        ctx.fillRect(mapCenter.x, 0, 400, mapCenter.y); ctx.fillRect(0, mapCenter.y, mapCenter.x, 400);
    } else {
        ctx.fillRect(0, 0, mapCenter.x, mapCenter.y); ctx.fillRect(mapCenter.x, mapCenter.y, 400, 400);
    }
    ctx.fillStyle = `rgba(255, 105, 180, ${alpha2})`; ctx.translate(mapCenter.x, mapCenter.y);
    ctx.rotate(bossA_Gimmick.thunderPattern >= 2 ? Math.PI/4 : -Math.PI/4);
    const w = 175;
    if (bossA_Gimmick.thunderPattern % 2 === 0) {
        ctx.fillRect(-w, -mapRadius, w, mapRadius*2); ctx.fillRect(w, -mapRadius, w, mapRadius*2);
    } else {
        ctx.fillRect(-2*w, -mapRadius, w, mapRadius*2); ctx.fillRect(0, -mapRadius, w, mapRadius*2);
    }
    ctx.restore();
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (!isGameStarted && !isGameOver) {
        const bg = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
        bg.addColorStop(0, '#101820');
        bg.addColorStop(1, '#1b102a');
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        return;
    }

    ctx.beginPath(); ctx.arc(mapCenter.x, mapCenter.y, mapRadius, 0, Math.PI * 2);
    ctx.strokeStyle = '#555'; ctx.lineWidth = 5; ctx.stroke(); ctx.fillStyle = '#1a1a1a'; ctx.fill();

    const waymarkRadius = 18;
    const waymarkOffset = mapRadius - 35;
    const waymarks = [
        { x: mapCenter.x, y: mapCenter.y - waymarkOffset, text: 'A', color: '#ff3333' },
        { x: mapCenter.x + waymarkOffset, y: mapCenter.y, text: 'B', color: '#ffd700' },
        { x: mapCenter.x, y: mapCenter.y + waymarkOffset, text: 'C', color: '#4cc9f0' },
        { x: mapCenter.x - waymarkOffset, y: mapCenter.y, text: 'D', color: '#bf55ec' } 
    ];

    ctx.save();
    waymarks.forEach(wm => {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
        ctx.fillRect(wm.x - waymarkRadius, wm.y - waymarkRadius, waymarkRadius * 2, waymarkRadius * 2);
        ctx.strokeStyle = wm.color; ctx.lineWidth = 2;
        ctx.strokeRect(wm.x - waymarkRadius, wm.y - waymarkRadius, waymarkRadius * 2, waymarkRadius * 2);
        ctx.fillStyle = wm.color; ctx.font = 'bold 22px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(wm.text, wm.x, wm.y + 2);
    });
    ctx.restore();

    if (isGameStarted) {
        if (bosses[0].isCasting) drawAoELayers(0.08, 0.12); 
        else if (bossA_Gimmick.showAoE) drawAoELayers(0.35, 0.45); 
        
        if (thunderga_Gimmick.isCasting) drawThundergaAoELayer(thunderga_Gimmick.thunderPattern, 0.12);
        else if (thunderga_Gimmick.showAoE) drawThundergaAoELayer(thunderga_Gimmick.thunderPattern, 0.45);

        if (blizzaga_Gimmick.isCasting) drawBlizzagaAoELayer(blizzaga_Gimmick.blizzardPattern, 0.12);
        else if (blizzaga_Gimmick.showAoE) drawBlizzagaAoELayer(blizzaga_Gimmick.blizzardPattern, 0.45);

        drawFinalMemoryAoE();

        subBossPlacedAoEs.forEach(aoe => {
            if (aoe.showVisual) {
                ctx.save();
                ctx.fillStyle = 'rgba(255, 69, 0, 0.45)'; 
                ctx.strokeStyle = '#ff4500';
                ctx.lineWidth = 3;
                if (aoe.shape === "CIRCLE") {
                    ctx.beginPath(); ctx.arc(aoe.x, aoe.y, 120, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
                } else if (aoe.shape === "DONUT") {
                    ctx.beginPath(); ctx.arc(aoe.x, aoe.y, 220, 0, Math.PI * 2);
                    ctx.arc(aoe.x, aoe.y, 80, 0, Math.PI * 2, true); 
                    ctx.fill(); ctx.stroke();
                }
                ctx.restore();
            }
        });

        if (currentWave === 3) drawWave3SplitAoE();
    }

    explosionVisuals.forEach(vis => {
        ctx.save(); ctx.beginPath(); ctx.arc(vis.x, vis.y, vis.radius, 0, Math.PI * 2);
        ctx.strokeStyle = vis.color ? vis.color : `rgba(0, 180, 216, ${vis.alpha})`;
        ctx.lineWidth = 4; ctx.stroke(); ctx.restore();
    });

    bosses.forEach((boss, index) => {
        if (currentWave === 3 && isSubBossesVanished && index > 0) return;

        let isInterfaceActive = boss.isCasting || (index === 0 && (thunderga_Gimmick.isCasting || blizzaga_Gimmick.isCasting || finalMemoryState.showRings)) || (boss.castCompleteTime && (Date.now() - boss.castCompleteTime < 2000));
        ctx.beginPath(); ctx.arc(boss.x, boss.y, bossRadius, 0, Math.PI * 2);
        ctx.fillStyle = boss.color; ctx.fill(); ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();

        if (isInterfaceActive) {
            if (index === 0) {
                if (finalMemoryState.showRings) drawFinalMemoryRings(boss.x, boss.y);
                else drawCenterBossRings(boss.x, boss.y);
            } else {
                ctx.save(); ctx.translate(boss.x, boss.y);
                const ringRadiusX = 45; const ringRadiusY = 15; const size = 20;
                ctx.strokeStyle = 'rgba(0, 180, 216, 0.35)'; ctx.lineWidth = 6;
                ctx.beginPath(); ctx.ellipse(0, 0, ringRadiusX, ringRadiusY, 0, 0, Math.PI * 2); ctx.stroke();
                ctx.strokeStyle = '#00f5d4'; ctx.lineWidth = 2; ctx.stroke();
                if (imagesLoaded.truth && imagesLoaded.fake) {
                    let subImg = boss.currentEffect === '진실' ? imgTruth : imgFake;
                    ctx.drawImage(subImg, -ringRadiusX - size/2, -size/2, size, size); ctx.drawImage(subImg, ringRadiusX - size/2, -size/2, size, size);
                } else {
                    ctx.fillStyle = boss.currentEffect === '진실' ? '#00b4d8' : '#ff4444';
                    ctx.fillRect(-ringRadiusX - 5, -5, 10, 10); ctx.fillRect(ringRadiusX - 5, -5, 10, 10);
                }
                ctx.restore();
            }
            
            const barW = 100; const barH = 10; const barX = boss.x - barW / 2; const barY = boss.y - bossRadius - 25;
            
            if (index === 1 && boss.isCasting) {
                ctx.save(); ctx.fillStyle = '#fff'; ctx.font = '11px sans-serif'; ctx.textAlign = 'center';
                ctx.fillText(bossCastLabel(boss.castName), boss.x, barY - 5); ctx.restore();
            }

            ctx.fillStyle = '#000'; ctx.fillRect(barX, barY, barW, barH);
            
            if (index === 0 && thunderga_Gimmick.isCasting) {
                ctx.fillStyle = '#bf55ec'; 
                ctx.fillRect(barX, barY, barW * thunderga_Gimmick.progress, barH);
            } else if (index === 0 && blizzaga_Gimmick.isCasting) {
                ctx.fillStyle = '#00b4d8'; 
                ctx.fillRect(barX, barY, barW * blizzaga_Gimmick.progress, barH);
            } else if (index === 0 && finalMemoryState.isCasting) {
                let progress = Math.min((Date.now() - finalMemoryState.castStartTime) / 3000, 1);
                ctx.fillStyle = '#f77f00'; 
                ctx.fillRect(barX, barY, barW * progress, barH);
            } else {
                ctx.fillStyle = boss.progress >= 1 ? '#ff3333' : '#ffaa00'; ctx.fillRect(barX, barY, barW * boss.progress, barH);
            }
            ctx.strokeStyle = '#888'; ctx.lineWidth = 1; ctx.strokeRect(barX, barY, barW, barH);
        }
    });

        ctx.strokeStyle = 'rgba(255, 69, 0, 0.4)'; ctx.lineWidth = 6;

    if (!player.isDead) {

            ctx.save();
            ctx.strokeStyle = 'rgba(157, 220, 255, 0.65)';
            ctx.fillStyle = 'rgba(157, 220, 255, 0.12)';

            ctx.lineWidth = 2;

            ctx.arc(player.moveTarget.x, player.moveTarget.y, 12, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.beginPath();
            ctx.moveTo(player.moveTarget.x - 14, player.moveTarget.y);
            ctx.lineTo(player.moveTarget.x + 14, player.moveTarget.y);
            ctx.moveTo(player.moveTarget.x, player.moveTarget.y - 14);
            ctx.lineTo(player.moveTarget.x, player.moveTarget.y + 14);
            ctx.stroke();
            ctx.restore();
        }
        ctx.beginPath(); ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
        ctx.fillStyle = player.color; ctx.fill(); ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
        ctx.beginPath(); ctx.moveTo(player.x, player.y); ctx.lineTo(player.x + player.facingX * 20, player.y + player.facingY * 20);
        ctx.strokeStyle = '#ff0055'; ctx.lineWidth = 3; ctx.stroke();
    } else {
        ctx.strokeStyle = '#ff3333'; ctx.lineWidth = 4; ctx.beginPath();
        ctx.moveTo(player.x - 15, player.y - 15); ctx.lineTo(player.x + 15, player.y + 15);
        ctx.moveTo(player.x + 15, player.y - 15); ctx.lineTo(player.x - 15, player.y + 15);

    ctx.fillStyle = '#fff'; ctx.font = 'bold 20px sans-serif'; ctx.textAlign = 'left';
    ctx.fillText(`${t('ui.battleTime')}: ${elapsedTimeDisplay}${t('ui.timeUnit')}`, 30, 50);

    if (isGameStarted && !isGameOver && !isGameCleared) {
        if (showDebugText) {
            ctx.font = '13px sans-serif';
            ctx.fillStyle = '#ffffff';
            ctx.fillText(`向き: ${player.facingCardinal}`, 30, 80);
            drawGuideHintPanel(canvas.width - 18, canvas.height - 18, 340);

        ctx.fillStyle = showDebugText ? '#4cc9f0' : '#777'; 
        ctx.fillRect(toggleButton.x, toggleButton.y, toggleButton.width, toggleButton.height);

    }

    if (isGameStarted) {
        let visibleDebuffs = activeDebuffs.filter(d => !d.processed);
        if (visibleDebuffs.length > 0) {
            const startYRow1 = 60;
            const startYRow2 = 122;
            const iconSize = 28; 
            const gap = 58;          
            const row1Items = visibleDebuffs.filter(d => d.row !== 2);
            const row2Items = visibleDebuffs.filter(d => d.row === 2);
            const row1Width = row1Items.length > 0 ? ((row1Items.length - 1) * gap + iconSize) : 0;
            const row2Width = row2Items.length > 0 ? ((row2Items.length - 1) * gap + iconSize) : 0;
            const rightEdge = canvas.width - 20;
            const startXRow1 = Math.max(20, rightEdge - row1Width);
            const startXRow2 = Math.max(20, rightEdge - row2Width);

            let row1Count = 0;
            let row2Count = 0;

            visibleDebuffs.forEach((debuff) => {
                let isRow2 = (debuff.row === 2);
                let currentX = (isRow2 ? startXRow2 : startXRow1) + ((isRow2 ? row2Count : row1Count) * gap);
                let currentY = isRow2 ? startYRow2 : startYRow1;

                if (isRow2) row2Count++; else row1Count++;

                if (imagesLoaded[debuff.loadKey]) {
                    ctx.drawImage(debuff.img, currentX, currentY, iconSize, iconSize);
                } else {
                    ctx.fillStyle = debuff.color; ctx.fillRect(currentX, currentY, iconSize, iconSize);
                    ctx.fillStyle = '#fff'; ctx.font = 'bold 8px sans-serif'; ctx.textAlign = 'center';
                    ctx.fillText(debuff.type, currentX + iconSize/2, currentY + 18);
                }

                if (showDebugText) {
                    ctx.save(); ctx.font = 'bold 10px sans-serif'; ctx.textAlign = 'center';
                    let textResult = debuff.actionText;

                    if (currentWave === 3 && wave3TimelineState === "POPUP" && textResult === "CALC" && activeDebuffs.length >= 2) {
                        let colorDebuff = activeDebuffs.find(d => d.type === "DEAD_SCAR" || d.type === "LIVE_SCAR");
                        let hitDebuff = activeDebuffs.find(d => d.type === "ALAG" || d.type === "TRANSCEND");
                        if (colorDebuff && hitDebuff) {
                            let isBlue = colorDebuff.type === "DEAD_SCAR";
                            let isAlag = hitDebuff.type === "ALAG";
                            if (wave3BossB.currentEffect === "거짓") isAlag = !isAlag;
                            textResult = isAlag ? (isBlue ? "분홍맞기" : "파란맞기") : (isBlue ? "파란맞기" : "분홍맞기");
                        }
                    }

                    let krWord = "";
                    if (textResult === "SHARE") { krWord = actionLabel(textResult); ctx.fillStyle = '#4ec9b0'; }
                    else if (textResult === "SPREAD") { krWord = actionLabel(textResult); ctx.fillStyle = '#f77f00'; }
                    else if (textResult === "LOOK") { krWord = actionLabel(textResult); ctx.fillStyle = '#a2d2ff'; }
                    else if (textResult === "HIDE") { krWord = actionLabel(textResult); ctx.fillStyle = '#bf55ec'; }
                    else if (textResult === "MOVE") { krWord = actionLabel(textResult); ctx.fillStyle = '#ffcc00'; }
                    else if (textResult === "STOP") { krWord = actionLabel(textResult); ctx.fillStyle = '#ff4444'; }
                    else if (textResult === "물압축") { krWord = t('boss.flood'); ctx.fillStyle = '#00b4d8'; }
                    else if (textResult === "갈래번개") { krWord = t('boss.flame'); ctx.fillStyle = '#bf55ec'; }
                    else if (textResult === "해일") { krWord = `${bossCastLabel(textResult)}[${effectLabel(debuff.rule)}]`; ctx.fillStyle = '#00b4d8'; } 
                    else if (textResult === "불꽃") { krWord = `${bossCastLabel(textResult)}[${effectLabel(debuff.rule)}]`; ctx.fillStyle = '#ff4500'; } 
                    else if (textResult === "파란맞기") { krWord = actionLabel(textResult); ctx.fillStyle = '#00b4d8'; }
                    else if (textResult === "분홍맞기") { krWord = actionLabel(textResult); ctx.fillStyle = '#ff69b4'; }
                    else if (textResult === "CALC") { krWord = actionLabel(textResult); ctx.fillStyle = '#bbb'; }

                    drawDebuffActionLabel(krWord, currentX + iconSize/2, currentY, ctx.fillStyle);
                    ctx.restore();
                }

                ctx.save(); ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center';
                ctx.strokeStyle = '#000000'; ctx.lineWidth = 3; ctx.strokeText(debuff.timeLeft, currentX + iconSize/2, currentY + iconSize + 15);
                ctx.fillStyle = '#ffffff'; ctx.fillText(debuff.timeLeft, currentX + iconSize/2, currentY + iconSize + 15); ctx.restore();
            });
        }
    }


    if (isGameOver || isGameCleared) {
        if (isGameOver) {
            ctx.fillStyle = '#ff3333';
            ctx.font = 'bold 18px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            const deathLines = wrapText(t('ui.deathPrefix') + deathReason, 620);
            const baseY = mapCenter.y - 95;
            const lineGap = 24;
            deathLines.forEach((line, index) => {
                ctx.fillText(line, mapCenter.x, baseY + index * lineGap);
            });
        } else {
            ctx.fillStyle = '#4ec9b0'; ctx.font = 'bold 36px sans-serif'; ctx.textAlign = 'center';
            ctx.fillText(t('ui.phaseClear'), mapCenter.x, mapCenter.y - 80);
        }

        ctx.fillStyle = '#f77f00'; ctx.fillRect(retryButton.x, retryButton.y, retryButton.width, retryButton.height);
        ctx.fillStyle = '#fff'; ctx.font = 'bold 16px sans-serif'; ctx.textAlign = 'center';
        ctx.fillText(t('ui.retry'), retryButton.x + retryButton.width/2, retryButton.y + 30);
    }



    if (isPaused) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 40px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(t('ui.paused'), canvas.width / 2, canvas.height / 2);
    }
}

function update() {
    let dx = 0; let dy = 0;
    if (!player.isDead) {
        if (keys['w'] || keys['arrowup']) { player.y -= player.speed; dy = -1; }
        if (keys['s'] || keys['arrowdown']) { player.y += player.speed; dy = 1; }
        if (keys['a'] || keys['arrowleft']) { player.x -= player.speed; dx = -1; }
        if (keys['d'] || keys['arrowright']) { player.x += player.speed; dx = 1; }
        if (dx !== 0 || dy !== 0) {
            player.moveTarget = null;
            setPlayerFacing(dx, dy);
        } else if (player.moveTarget) {
            const tx = player.moveTarget.x - player.x;
            const ty = player.moveTarget.y - player.y;
            const distance = Math.hypot(tx, ty);
            if (distance <= player.speed) {
                player.x = player.moveTarget.x;
                player.y = player.moveTarget.y;
                player.moveTarget = null;
            } else if (distance > 0) {
                player.x += (tx / distance) * player.speed;
                player.y += (ty / distance) * player.speed;
                setPlayerFacing(tx, ty);
            }
        }
    }
    const distance = Math.hypot(player.x - mapCenter.x, player.y - mapCenter.y);
    if (distance + player.radius > mapRadius) {
        const angle = Math.atan2(player.y - mapCenter.y, player.x - mapCenter.x);
        player.x = mapCenter.x + Math.cos(angle) * (mapRadius - player.radius);
        player.y = mapCenter.y + Math.sin(angle) * (mapRadius - player.radius);
    }
    if (player.moveTarget) {
        player.moveTarget = clampPointToArena(player.moveTarget.x, player.moveTarget.y);
    }
    explosionVisuals.forEach(vis => { vis.radius += 2.5; vis.alpha -= 0.02; });
    explosionVisuals = explosionVisuals.filter(vis => vis.alpha > 0);

    if (!isGameStarted || isGameOver || isGameCleared) return;
    const now = Date.now();
    elapsedTimeDisplay = ((now - globalStartTime) / 1000).toFixed(1);

    activeDebuffs.forEach(debuff => {
        debuff.timeLeft = Math.max(debuff.initialDuration - Math.floor((now - debuff.assignTime) / 1000), 0);
        if (debuff.timeLeft === 0 && !debuff.processed) processDebuffTrigger(debuff);
    });

    drawVirtualTimerIndicator();

    subBossPlacedAoEs.forEach(aoe => {
        if (now >= aoe.detonationTime && !aoe.judged) {
            aoe.judged = true;
            aoe.showVisual = true;
            aoe.visualEndTime = now + 1500; 
            evaluateSubBossAoESafety(aoe);
        }
    });
    subBossPlacedAoEs = subBossPlacedAoEs.filter(aoe => !aoe.visualEndTime || now < aoe.visualEndTime);

    if (thunderga_Gimmick.isCasting) {
        thunderga_Gimmick.progress = Math.min((now - thunderga_Gimmick.startTime) / thunderga_Gimmick.duration, 1);
        if (thunderga_Gimmick.progress >= 1) {
            thunderga_Gimmick.isCasting = false;
            thunderga_Gimmick.showAoE = true;
            thunderga_Gimmick.aoeStartTime = now;
            checkThundergaSafety();
        }
    }
    if (thunderga_Gimmick.showAoE && now - thunderga_Gimmick.aoeStartTime > 1500) {
        thunderga_Gimmick.showAoE = false;
    }

    if (blizzaga_Gimmick.isCasting) {
        blizzaga_Gimmick.progress = Math.min((now - blizzaga_Gimmick.startTime) / blizzaga_Gimmick.duration, 1);
        if (blizzaga_Gimmick.progress >= 1) {
            blizzaga_Gimmick.isCasting = false;
            blizzaga_Gimmick.showAoE = true;
            blizzaga_Gimmick.aoeStartTime = now;
            checkBlizzagaSafety();
        }
    }
    if (blizzaga_Gimmick.showAoE && now - blizzaga_Gimmick.aoeStartTime > 1500) {
        blizzaga_Gimmick.showAoE = false;
    }

    if (finalMemoryState.showRings && now - finalMemoryState.ringStartTime > 5000) {
        finalMemoryState.showRings = false;
    }

    if (currentWave === 3) {
        if (wave3TimelineState === "CAST_DONE") {
            if (now - wave3TimerAnchor >= 2000) {
                wave3TimelineState = "VANISHED";
                isSubBossesVanished = true; 
                wave3TimerAnchor = now;     
            }
        } 
        else if (wave3TimelineState === "VANISHED") {
            if (now - wave3TimerAnchor >= 2000) {
                wave3TimelineState = "POPUP";
                const random8Index = Math.floor(Math.random() * 8);
                const randomAngle = (random8Index * Math.PI) / 4;
                const spawnRadius = mapRadius - 30;
                let bossTruthRule = effectTypes[Math.floor(Math.random() * 2)];

                wave3BossB = {
                    x: mapCenter.x + Math.cos(randomAngle) * spawnRadius,
                    y: mapCenter.y + Math.sin(randomAngle) * spawnRadius,
                    angle: randomAngle,
                    isCasting: true,
                    startTime: now,
                    duration: 5000, 
                    progress: 0,
                    showAoE: true,
                    currentEffect: bossTruthRule 
                };
            }
        }
        else if (wave3TimelineState === "POPUP" && wave3BossB.isCasting) {
            wave3BossB.progress = Math.min((now - wave3BossB.startTime) / wave3BossB.duration, 1);
            if (wave3BossB.progress >= 1) {
                wave3BossB.isCasting = false;
                checkWave3SplitSafety(); 
            }
        }
        
        if (isSubBossesVanished && !wave3BossB.isCasting && !player.isDead) {
            let elapsedSec = (now - globalStartTime) / 1000;
            finalPhaseTimeline.forEach(evt => {
                if (!evt.triggered && elapsedSec >= evt.t) {
                    evt.triggered = true;
                    if (evt.t === 51) executeEnvironmentCheck(51);
                    else if (evt.t === 53) {
                        thunderga_Gimmick.isCasting = true;
                        thunderga_Gimmick.startTime = Date.now();
                        thunderga_Gimmick.progress = 0;
                        thunderga_Gimmick.effect = effectTypes[Math.floor(Math.random() * 2)]; 
                        thunderga_Gimmick.thunderPattern = Math.floor(Math.random() * 4); 
                        thunderga_Gimmick.judged = false;
                        thunderga_Gimmick.showAoE = false;
                        pastThundergaTruth = thunderga_Gimmick.effect;
                    }
                    else if (evt.t === 57) {
                        let targetEye = backgroundEyes.find(e => e.wave === 1 && !e.processed);
                        if (targetEye) executeSingleEyeCheck(targetEye);
                    }
                    else if (evt.t === 70) {
                        blizzaga_Gimmick.isCasting = true;
                        blizzaga_Gimmick.startTime = Date.now();
                        blizzaga_Gimmick.progress = 0;
                        blizzaga_Gimmick.effect = effectTypes[Math.floor(Math.random() * 2)]; 
                        blizzaga_Gimmick.blizzardPattern = Math.floor(Math.random() * 2); 
                        blizzaga_Gimmick.judged = false;
                        blizzaga_Gimmick.showAoE = false;
                        pastBlizzagaTruth = blizzaga_Gimmick.effect;
                    }
                    else if (evt.t === 74) executeEnvironmentCheck(74);
                    else if (evt.t === 79) {
                        let targetEye = backgroundEyes.find(e => e.wave === 2 && !e.processed);
                        if (targetEye) executeSingleEyeCheck(targetEye);

                        finalMemoryState.showRings = true;
                        finalMemoryState.ringStartTime = Date.now();
                        finalMemoryState.topTruth = effectTypes[Math.floor(Math.random() * 2)];
                        finalMemoryState.bottomTruth = effectTypes[Math.floor(Math.random() * 2)];
                    }
                    else if (evt.t === 84) {
                        finalMemoryState.isCasting = true;
                        finalMemoryState.castStartTime = Date.now();
                        finalMemoryState.thunderPattern = Math.floor(Math.random() * 4);
                        finalMemoryState.blizzardPattern = Math.floor(Math.random() * 2);
                    }
                    else if (evt.t === 87) {
                        checkFinalMemorySafety();
                        finalMemoryState.isCasting = false;
                    }
                    else if (evt.t === 90) {
                        if (!player.isDead) isGameCleared = true;
                    }
                }
            });
        }
    }

    bosses.forEach((boss, index) => {
        if (boss.isCasting) {
            boss.progress = Math.min((now - boss.startTime) / boss.duration, 1);
            if (boss.progress >= 1) {
                boss.isCasting = false; boss.castCompleteTime = now;
                if (index === 0) {
                    bossA_Gimmick.showAoE = true; bossA_Gimmick.aoeStartTime = now; checkSafety(); 
                    if (!player.isDead && currentWave < 3) { 
                        bosses[1].startTime = now; bosses[1].progress = 0; bosses[1].isCasting = true; bosses[1].castCompleteTime = null; 
                    }
                }
                if (index === 1 && !player.isDead) {
                    assign11BossDebuff(currentWave); 
                    currentWave++; randomizeGimmick();
                    bosses[0].startTime = now; bosses[0].progress = 0; bosses[0].isCasting = true; bosses[0].castCompleteTime = null;
                    bosses[2].startTime = now; bosses[2].progress = 0; bosses[2].isCasting = true; bosses[2].castCompleteTime = null;
                }
                if (index === 2 && !player.isDead) {
                    assignGimmickDebuffs(currentWave);
                }
            }
        }
    });
    if (bossA_Gimmick.showAoE && now - bossA_Gimmick.aoeStartTime > 2000) bossA_Gimmick.showAoE = false;
}

function gameLoop() { if (!isPaused) update(); draw(); requestAnimationFrame(gameLoop); }
gameLoop();
</script>
